# Alembic configuration.
#
# The project kept schema in sync with create_all + additive ALTER TABLE
# (database._apply_additive_migrations) for as long as every change was a new
# nullable/defaulted column. Alembic is the harness for the first change that is
# NOT additive — a rename, a type change, a drop — which that mechanism cannot
# express without losing data. See database._run_migrations for how existing
# case.db files adopt it (they are stamped at the baseline, never rebuilt).
#
# sqlalchemy.url is intentionally blank: env.py derives it from app.config.DB_PATH
# so the CLI and the app always target the same database, wherever it lives (the
# Raspberry Pi deploy moves it). Programmatic runs pass a live connection instead.
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
